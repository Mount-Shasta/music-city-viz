<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music City Viz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div id="note-container">
    <svg id="music-note" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
      <!-- Eighth note -->
      <g id="note-group">
        <!-- Note head -->
        <ellipse cx="70" cy="250" rx="38" ry="28" transform="rotate(-20, 70, 250)" fill="#e63946" />
        <!-- Stem -->
        <rect x="104" y="40" width="6" height="220" rx="3" fill="#e63946" />
        <!-- Flag -->
        <path d="M110 40 C130 60, 145 90, 125 130 C140 100, 135 70, 110 55" fill="#e63946" />
      </g>
    </svg>
    <div id="glow"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
